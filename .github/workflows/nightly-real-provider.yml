name: Nightly Real Provider E2E

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  real-provider-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build (E2E test mode)
        run: npm run build
        env:
          VITE_BRYANTLABS_E2E: "1"

      - name: Real-provider smoke (opt-in)
        if: env.GROQ_API_KEY != '' || env.ANTHROPIC_API_KEY != ''
        run: npm run test:e2e:real
        env:
          CI: "1"
          BRYANTLABS_E2E_REAL_PROVIDER: "1"
          PLAYWRIGHT_USE_DIST: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Skip notice (no API key configured)
        if: env.GROQ_API_KEY == '' && env.ANTHROPIC_API_KEY == ''
        run: echo "Skipping real-provider smoke — add GROQ_API_KEY or ANTHROPIC_API_KEY repo secret."
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
