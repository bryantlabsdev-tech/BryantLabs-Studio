name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (renderer)
        run: npm run test:unit

      - name: Unit tests (electron main)
        run: npm run test:electron

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build (E2E test mode)
        run: npm run build
        env:
          VITE_BRYANTLABS_E2E: "1"

      - name: E2E (mock provider)
        run: npm run test:e2e
        env:
          CI: "1"
          BRYANTLABS_MOCK_PROVIDER: "1"
          PLAYWRIGHT_USE_DIST: "1"
